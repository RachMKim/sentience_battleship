services:
  - type: web
    name: battleship
    runtime: node
    plan: free
    # Prisma validates DATABASE_URL at generate/migrate time; inline it so builds work even if dashboard env is missing.
    buildCommand: 'DATABASE_URL=file:./dev.db npm run install:all && DATABASE_URL=file:./dev.db npm run build'
    startCommand: 'DATABASE_URL=file:./dev.db npm run start'
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: NODE_ENV
        value: production
